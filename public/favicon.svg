<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Rich Golden Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="30%" stop-color="#F59E0B" />
      <stop offset="70%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    
    <!-- Deep Dark Slate Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <!-- Soft Glow Shadow for Cap -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#F59E0B" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Premium rounded container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer accent ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.25" />

  <!-- Logo Group -->
  <g filter="url(#glow)">
    <!-- Graduation Cap Top (Diamond) -->
    <path d="M256 120 L416 200 L256 280 L96 200 Z" fill="url(#goldGrad)" />
    
    <!-- Graduation Cap Base/Skullcap -->
    <path d="M160 235 V300 C160 340, 352 340, 352 300 V235 L256 280 Z" fill="url(#goldGrad)" opacity="0.9" />
    
    <!-- Tassel String and Button -->
    <path d="M256 190 A10 10 0 1 1 256 210 A10 10 0 1 1 256 190 Z" fill="#FFFFFF" opacity="0.9" />
    <path d="M266 200 C320 200, 375 220, 375 260" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.6" />
    <path d="M375 260 L375 310" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- Progress Tracking Arrow / Path representing "Track" -->
  <path d="M130 390 L210 320 L290 350 L370 270" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M310 270 H370 V330" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
</svg>